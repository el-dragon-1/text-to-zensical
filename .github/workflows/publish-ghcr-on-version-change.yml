name: Publish GHCR Image On Version Change

on:
  push:
    branches:
      - main
    paths:
      - VERSION
      - Dockerfile
      - requirements.txt
      - app.py
      - templates/**
      - static/**
      - README.md
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: text-to-zensical

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          RAW_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$RAW_VERSION" ]]; then
            echo "VERSION file is empty"
            exit 1
          fi

          # Accept 1.2.3 or v1.2.3, normalize to both forms.
          if [[ "$RAW_VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION_NO_V="${RAW_VERSION#v}"
            VERSION_TAG="v${VERSION_NO_V}"
          else
            echo "Invalid VERSION '$RAW_VERSION'. Use semantic version like 1.2.3 or v1.2.3"
            exit 1
          fi

          echo "version_no_v=$VERSION_NO_V" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_tag }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version_tag }}
            org.opencontainers.image.revision=${{ github.sha }}

services:
  text-to-zensical:
    image: ${TEXT_TO_ZENSICAL_IMAGE:-ghcr.io/el-dragon-1/text-to-zensical}:${TEXT_TO_ZENSICAL_TAG:-latest}
    container_name: text-to-zensical
    ports:
      - "${PORT:-10253}:8000"
    environment:
      - OUTPUT_ROOT=${OUTPUT_ROOT:-/data/exports}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./exports:/data/exports
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
